<!DOCTYPE html>
<html lang="en">

<head>
    <title>Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            border-radius: 30px;
            padding: 10px;
        }

        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="card p-4 shadow-lg">

            <h2 class="text-center mb-4">📊 Prediction Form</h2>

            <form action="{{ url_for('predict_datapoint') }}" method="post">
                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Gender</label>
                        <select class="form-select" name="gender" required>
                            <option disabled selected>Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Race/Ethnicity</label>
                        <select class="form-select" name="race_ethnicity" required>
                            <option disabled selected>Select</option>
                            <option value="group A">A</option>
                            <option value="group B">B</option>
                            <option value="group C">C</option>
                            <option value="group D">D</option>
                            <option value="group E">E</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Parental Education</label>
                        <select class="form-select" name="parental_level_of_education" required>
                            <option disabled selected>Select</option>
                            <option value="bachelor's degree">Bachelor's</option>
                            <option value="master's degree">Master's</option>
                            <option value="high school">High School</option>
                            <option value="some college">Some College</option>
                            <option value="associate's degree">Associate</option>
                            <option value="some high school">Some HS</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Lunch</label>
                        <select class="form-select" name="lunch" required>
                            <option disabled selected>Select Lunch</option>
                            <option value="standard">Standard</option>
                            <option value="free/reduced">Free/Reduced</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Test Preparation</label>
                        <select class="form-select" name="test_preparation_course" required>
                            <option disabled selected>Select</option>
                            <option value="none">None</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Reading Score</label>
                        <input type="number" name="reading_score" class="form-control" min="0" max="100" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Writing Score</label>
                        <input type="number" name="writing_score" class="form-control" min="0" max="100" required>
                    </div>

                </div>

                <div class="text-center mt-3">
                    <button class="btn btn-primary btn-lg w-50">Predict</button>
                </div>
            </form>

            {% if results %}
            <div class="alert alert-success text-center mt-4 result-box">
                🎯 Predicted Score: {{ results }}
            </div>
            {% endif %}

        </div>
    </div>

</body>

</html>
