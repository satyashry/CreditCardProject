<!DOCTYPE html>
<html lang="en">

<head>
    <title>Student Performance Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #0a0c14;
            --surface: #10131f;
            --card: #161b2e;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #6c63ff;
            --accent2: #00e5c3;
            --text: #e8eaf6;
            --muted: #7b82a0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108, 99, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 99, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: drift 10s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.22), transparent 70%);
            top: -80px;
            left: -80px;
        }

        .blob-2 {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(0, 229, 195, 0.15), transparent 70%);
            bottom: -60px;
            right: -60px;
            animation-delay: -5s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.08);
            }
        }

        .card {
            position: relative;
            z-index: 2;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 56px 52px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge-tag {
            display: inline-block;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent2);
            background: rgba(0, 229, 195, 0.1);
            border: 1px solid rgba(0, 229, 195, 0.2);
            border-radius: 100px;
            padding: 5px 14px;
            margin-bottom: 24px;
        }

        .icon-wrap {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.35);
            animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 12px;
            animation: fadeUp 0.7s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        h1 span {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            background-clip: text;

            -webkit-background-clip: text;

            color: transparent;

            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 36px;
            animation: fadeUp 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            margin: 0 auto 28px;
            animation: fadeUp 0.7s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .btn-custom {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #8b83ff);
            border: none;
            border-radius: 100px;
            padding: 14px 36px;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 24px rgba(108, 99, 255, 0.4);
            animation: fadeUp 0.7s 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .btn-custom::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent);
            pointer-events: none;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(108, 99, 255, 0.55);
            color: #fff;
            text-decoration: none;
        }

        .btn-custom:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            gap: 1px;
            margin-top: 40px;
            background: var(--border);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: fadeUp 0.7s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .stat {
            flex: 1;
            padding: 16px 8px;
            background: rgba(255, 255, 255, 0.025);
            text-align: center;
        }

        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
        }

        .stat-label {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 2px;
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="badge-tag">ML Powered</div>

        <div class="icon-wrap">🎓</div>

        <h1>Student <span>Performance</span> Predictor</h1>

        <div class="divider"></div>

        <p>Predict Maths Score using Machine Learning</p>

        <a href="{{ url_for('predict_datapoint') }}" class="btn-custom">
            Start Prediction →
        </a>

        <div class="stats">
            <div class="stat">
                <div class="stat-num">7</div>
                <div class="stat-label">Features</div>
            </div>
            <div class="stat">
                <div class="stat-num">ML</div>
                <div class="stat-label">Powered</div>
            </div>
            <div class="stat">
                <div class="stat-num">100</div>
                <div class="stat-label">Max Score</div>
            </div>
        </div>
    </div>

</body>

</html>
